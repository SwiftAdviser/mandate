[phases.setup]
nixPkgs = ["php84", "php84Extensions.pdo_pgsql", "php84Extensions.redis", "php84Extensions.bcmath", "php84Extensions.pcntl", "php84Extensions.posix", "php84Extensions.gd", "php84Extensions.zip", "composer", "bun"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader", "bun install --frozen-lockfile", "bun run build"]

[phases.build]
cmds = ["php artisan config:cache", "php artisan route:cache", "php artisan view:cache", "php artisan migrate --force"]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=8080"
