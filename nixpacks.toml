[phases.setup]
nixPkgs = ["php84", "php84Extensions.pdo_pgsql", "php84Extensions.redis", "php84Extensions.bcmath", "php84Extensions.pcntl", "php84Extensions.posix", "php84Extensions.gd", "php84Extensions.zip", "bun", "nodejs_22", "python3", "python311Packages.supervisor"]

[phases.install]
cmds = [
  "curl -sS https://getcomposer.org/installer | php84 -- --install-dir=/usr/local/bin --filename=composer",
  "composer install --no-dev --optimize-autoloader",
  "bun install --frozen-lockfile",
  "bun run build"
]

[phases.build]
cmds = [
  "php artisan view:cache",
  "mkdir -p /var/log/supervisor"
]

[start]
cmd = "bash scripts/start.sh"
